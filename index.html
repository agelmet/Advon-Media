<!DOCTYPE html>
<html lang="el" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advon Media | Ψηφιακές Λύσεις Marketing</title>
    <meta name="description" content="Οι πιο αποτελεσματικές λύσεις marketing για τοπικές επιχειρήσεις. Δωρεάν κατασκευή ιστοσελίδας, διαχείριση social media, αξιολογήσεις Google." />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['Playfair Display', 'serif'],
              body: ['Inter', 'sans-serif'],
            },
            colors: {
              'electric-cyan': '#47c8f5',
              'deep-void': '#050a0e',
              'space-black': '#0a1418',
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'shimmer': 'shimmer 3s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              }
            }
          }
        }
      }
    </script>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #050a0e; }
      ::-webkit-scrollbar-thumb { background: rgba(71, 200, 245, 0.3); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #47c8f5; }
      
      body { background-color: #050a0e; color: white; overflow-x: hidden; cursor: default; }
    </style>
