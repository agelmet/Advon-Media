      /* --- Updated Laser Beam Animation --- */
      .laser-beam-main {
        position: absolute;
        left: 50%;
        top: 0;
        transform: translateX(-50%);
        width: 50px;
        height: 100%;
        background: linear-gradient(180deg, rgba(71, 200, 245, 0.1) 0%, rgba(71, 200, 245, 0.4) 10%, rgba(71, 200, 245, 0.9) 30%, rgba(71, 200, 245, 1) 50%, rgba(71, 200, 245, 0.9) 70%, rgba(71, 200, 245, 0.4) 90%, rgba(71, 200, 245, 0.1) 100%);

        animation: laser-pour 1.5s ease-in-out infinite, laser-glow 2s ease-in-out infinite;
        border-radius: 10px;
        will-change: transform, opacity;
        z-index: 2;
      }
      .laser-beam-main::before {
        content: '';
        position: absolute;
        left: 50%;
        top: 0;
        transform: translateX(-50%);
        width: 160px;
        height: 100%;
        background: linear-gradient(180deg, transparent 0%, rgba(71, 200, 245, 0.05) 20%, rgba(71, 200, 245, 0.15) 50%, rgba(71, 200, 245, 0.05) 80%, transparent 100%);
        filter: blur(20px);
      }
      .laser-splash {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 300px;
        height: 150px;
        background: radial-gradient(ellipse at center bottom, rgba(71, 200, 245, 0.6) 0%, rgba(71, 200, 245, 0.3) 30%, rgba(71, 200, 245, 0.1) 60%, transparent 100%);
        filter: blur(30px);
        animation: splash-pulse 1.5s ease-in-out infinite;
        will-change: transform, opacity;
        z-index: 3;
      }
      .laser-splash::before {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 150px;
        height: 80px;
        background: radial-gradient(ellipse at center bottom, rgba(71, 200, 245, 0.8) 0%, rgba(71, 200, 245, 0.4) 40%, transparent 100%);
        filter: blur(15px);
        animation: splash-inner 1s ease-in-out infinite;
      }
      .laser-particles {
        position: absolute;
        left: 50%;
        top: 0;
        transform: translateX(-50%);
        width: 60px;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
      }
      .laser-particle {
        position: absolute;
        width: 4px;
        height: 30px;
        background: linear-gradient(180deg, transparent, rgba(71, 200, 245, 0.8), transparent);
        border-radius: 2px;
        animation: particle-fall 0.8s linear infinite;
      }
      .laser-particle:nth-child(1) { left: 10%; animation-delay: 0s; }
      .laser-particle:nth-child(2) { left: 30%; animation-delay: 0.2s; }
      .laser-particle:nth-child(3) { left: 50%; animation-delay: 0.4s; }
      .laser-particle:nth-child(4) { left: 70%; animation-delay: 0.6s; }
      .laser-particle:nth-child(5) { left: 90%; animation-delay: 0.3s; }
      @keyframes particle-fall {
        0% { top: -30px; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
      @keyframes laser-pour {
        0%, 100% { opacity: 0.8; transform: translateX(-50%) scaleY(1); }
        25% { opacity: 1; transform: translateX(-50%) scaleY(1.02); }
        50% { opacity: 0.9; transform: translateX(-50%) scaleY(0.98); }
        75% { opacity: 1; transform: translateX(-50%) scaleY(1.01); }
      }
      @keyframes laser-glow {
        0%, 100% { box-shadow: 0 0 30px rgba(71, 200, 245, 0.9), 0 0 60px rgba(71, 200, 245, 0.7); }
        50% { box-shadow: 0 0 50px rgba(71, 200, 245, 1), 0 0 100px rgba(71, 200, 245, 0.8); }
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
        50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
      }
      @keyframes splash-inner {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      .laser-beam-secondary {
        position: absolute;
        top: 0;
        width: 3px;
        height: 100%;
        background: linear-gradient(180deg, transparent 0%, rgba(71, 200, 245, 0.1) 15%, rgba(71, 200, 245, 0.4) 40%, rgba(71, 200, 245, 0.5) 50%, rgba(71, 200, 245, 0.4) 60%, rgba(71, 200, 245, 0.1) 85%, transparent 100%);
        box-shadow: 0 0 10px rgba(71, 200, 245, 0.5);
        animation: laser-pour-secondary 2s ease-in-out infinite;
        border-radius: 2px;
        z-index: 1;
      }
      @keyframes laser-pour-secondary { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }

      #star-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
      .logo-glow { filter: drop-shadow(0 0 10px rgba(71, 200, 245, 0.5)); transition: filter 0.3s ease; }

      .text-shimmer { background: linear-gradient(to right, #47c8f5 20%, #ffffff 50%, #47c8f5 80%); background-size: 200% auto; color: transparent; -webkit-background-clip: text; background-clip: text; animation: shimmer 4s linear infinite; }
      .glass-panel { background: rgba(8, 18, 25, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(71, 200, 245, 0.1); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

                        <i data-lucide="chevron-down" class="w-5 h-5 transition-transform duration-300"></i>
                    </button>
                    <div class="max-h-0 overflow-hidden transition-all duration-300 px-6 text-gray-400 leading-relaxed">
                        <div class="pb-6">${item.answer}</div>
                    </div>
                </div>
            `).join('');

            // --- 8. Contact ---
            document.getElementById('contact-container').innerHTML = `
                <span class="reveal text-electric-cyan text-xs font-bold tracking-[0.3em] uppercase mb-4 block drop-shadow-[0_0_10px_rgba(71,200,245,0.4)]">${t.sectionTitles.contact}</span>
                <h2 class="reveal text-4xl md:text-6xl font-black font-display mb-8">${t.sectionTitles.contactMain}</h2>
                <p class="reveal text-xl text-gray-400 mb-12">${t.sectionTitles.contactSub}</p>
                <div class="grid md:grid-cols-2 gap-6">
                    <a href="mailto:advonmd@gmail.com" class="reveal group glass-panel p-8 rounded-2xl transition-all duration-300">
                        <div class="w-14 h-14 bg-electric-cyan/10 rounded-xl flex items-center justify-center mx-auto mb-6 text-electric-cyan group-hover:scale-110 transition-transform shadow-[0_0_15px_rgba(71,200,245,0.1)]">
                            <i data-lucide="mail" class="w-7 h-7"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-2">Email</h3>
                        <p class="text-electric-cyan flex items-center justify-center gap-2">advonmd@gmail.com <i data-lucide="arrow-up-right" class="w-4 h-4"></i></p>
                    </a>
                    <a href="https://www.instagram.com/advon_media" target="_blank" rel="noopener noreferrer" class="reveal group glass-panel p-8 rounded-2xl transition-all duration-300 delay-100">
                        <div class="w-14 h-14 bg-electric-cyan/10 rounded-xl flex items-center justify-center mx-auto mb-6 text-electric-cyan group-hover:scale-110 transition-transform shadow-[0_0_15px_rgba(71,200,245,0.1)]">
                            <i data-lucide="instagram" class="w-7 h-7"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-2">Instagram</h3>
                        <p class="text-electric-cyan flex items-center justify-center gap-2">@advon_media <i data-lucide="arrow-up-right" class="w-4 h-4"></i></p>
                    </a>
                </div>
            `;

            // --- 9. Footer ---
            document.getElementById('footer-content').innerHTML = `
                <p class="text-sm font-medium">© 2026 Advon Media. ${t.footer.rights}</p>
                <div class="flex gap-6 text-sm font-medium">
                    <a href="#services" class="hover:text-electric-cyan transition-colors">${t.nav.services}</a>
                    <a href="#portfolio" class="hover:text-electric-cyan transition-colors">${t.nav.portfolio}</a>
                    <a href="#contact" class="hover:text-electric-cyan transition-colors">${t.nav.contact}</a>
                </div>
            `;

            lucide.createIcons();
            observeElements();
        }

        // --- Logic ---

        function closeMobileMenu() {
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenu.style.maxHeight = '0px';
            mobileMenu.classList.remove('py-2');
        }

        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            const mobileMenu = document.getElementById('mobile-menu');
            if (mobileMenu.style.maxHeight && mobileMenu.style.maxHeight !== '0px') {
                mobileMenu.style.maxHeight = '0px';
                mobileMenu.classList.remove('py-2');
            } else {
                mobileMenu.style.maxHeight = '500px';
                mobileMenu.classList.add('py-2');
            }
        });

        // Portfolio Pagination
        let currentPage = 0;
        const itemsPerPage = 12;

        function renderPortfolioGrid() {
            const t = translations[currentLang];
            const totalPages = Math.ceil(portfolioItems.length / itemsPerPage);
            const start = currentPage * itemsPerPage;
            const end = start + itemsPerPage;
            const visibleItems = portfolioItems.slice(start, end);

            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = visibleItems.map((item, index) => {
                // Use English name if available and lang is EN
                const displayName = (currentLang === 'en' && item.nameEn) ? item.nameEn : item.name;
                return `
                <a href="${item.url}" target="_blank" rel="noopener noreferrer" 
                   class="reveal group relative aspect-[4/3] rounded-2xl overflow-hidden shadow-2xl border border-white/5 block active"
                   style="transition-delay: ${index * 50}ms">
                    <img src="${item.image}" alt="${displayName}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-6">
                        <h3 class="text-lg font-bold text-white mb-2">${displayName}</h3>
                        <span class="flex items-center gap-2 text-sm font-bold text-electric-cyan">
                            ${t.sectionTitles.viewSite} <i data-lucide="external-link" class="w-4 h-4"></i>
                        </span>
                    </div>
                </a>
            `}).join('');

            // Update Buttons
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage === totalPages - 1;
            
            // Re-bind click events safely
            prevBtn.onclick = () => { if(currentPage > 0) { currentPage--; renderPortfolioGrid(); lucide.createIcons(); observeElements(); document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth' }); }};
            nextBtn.onclick = () => { if(currentPage < totalPages - 1) { currentPage++; renderPortfolioGrid(); lucide.createIcons(); observeElements(); document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth' }); }};

            // Dots
            document.getElementById('pagination-dots').innerHTML = Array.from({ length: totalPages }).map((_, i) => `
                <div class="h-2 rounded-full transition-all duration-300 ${i === currentPage ? 'w-8 bg-electric-cyan' : 'w-2 bg-electric-cyan/30'}"></div>
            `).join('');
            
            lucide.createIcons();
            observeElements();
        }

        // FAQ Toggle
        window.toggleFaq = function(button) {
            const content = button.nextElementSibling;
            const icon = button.querySelector('svg');
            
            if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                content.style.maxHeight = '0px';
                icon.style.transform = 'rotate(0deg)';
                button.classList.remove('text-electric-cyan');
            } else {
                content.style.maxHeight = content.scrollHeight + 'px';
                icon.style.transform = 'rotate(180deg)';
                button.classList.add('text-electric-cyan');
            }
        }

        // Modal
        const modalOverlay = document.getElementById('modal-overlay');
        const modalBackdrop = document.getElementById('modal-backdrop');
        const modalContent = document.getElementById('modal-content');
        
        window.openModal = function(id) {
            const data = services[currentLang].find(s => s.id === id);
            if (!data) return;

            document.getElementById('modal-title').innerText = data.modal.title;
            const imgContainer = document.getElementById('modal-image-container');
            if (data.modal.image) {
                imgContainer.innerHTML = `<img src="${data.modal.image}" class="w-full h-auto rounded-lg border border-electric-cyan/20 shadow-lg" alt="${data.modal.title}">`;
                imgContainer.classList.remove('hidden');
            } else {
                imgContainer.classList.add('hidden');
            }
            document.getElementById('modal-body').innerHTML = data.modal.body.map(p => `<p class="${p.startsWith('•') ? 'pl-4' : ''}">${p}</p>`).join('');

            modalOverlay.classList.remove('hidden');
            modalOverlay.classList.add('flex');
            setTimeout(() => {
                modalBackdrop.classList.remove('opacity-0');
                modalContent.classList.remove('opacity-0', 'scale-95');
                modalContent.classList.add('opacity-100', 'scale-100');
            }, 10);
            document.body.classList.add('modal-open');
        }

        window.closeModal = function() {
            modalBackdrop.classList.add('opacity-0');
            modalContent.classList.remove('opacity-100', 'scale-100');
            modalContent.classList.add('opacity-0', 'scale-95');
            setTimeout(() => {
                modalOverlay.classList.add('hidden');
                modalOverlay.classList.remove('flex');
                document.body.classList.remove('modal-open');
            }, 300);
        }
        modalBackdrop.addEventListener('click', closeModal);

        // Scroll Observer
        function observeElements() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        // --- Star Canvas Animation ---
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [], shootingStars = [];

        function initStars() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            stars = [];
            const starCount = Math.floor(width * height / 1500);
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    opacity: Math.random(),
                    speed: Math.random() * 0.05 + 0.01,
                    twinkleSpeed: Math.random() * 0.02 + 0.005,
                    twinkleDir: 1
                });
            }
        }

        function animateStars() {
            ctx.clearRect(0, 0, width, height);
            
            stars.forEach(star => {
                star.opacity += star.twinkleSpeed * star.twinkleDir;
                if (star.opacity > 1 || star.opacity < 0.2) star.twinkleDir *= -1;
                star.y -= star.speed;
                if (star.y < 0) star.y = height;

                ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(star.opacity)})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            if (Math.random() < 0.015) {
                shootingStars.push({
                    x: Math.random() * width,
                    y: Math.random() * height / 2,
                    length: Math.random() * 80 + 20,
                    speed: Math.random() * 15 + 10,
                    angle: Math.PI / 4,
                    opacity: 1
                });
            }

            for (let i = shootingStars.length - 1; i >= 0; i--) {
                const star = shootingStars[i];
                star.x += Math.cos(star.angle) * star.speed;
                star.y += Math.sin(star.angle) * star.speed;
                star.opacity -= 0.02;

                if (star.opacity <= 0 || star.x > width || star.y > height) {
                    shootingStars.splice(i, 1);
                    continue;
                }

                const gradient = ctx.createLinearGradient(star.x, star.y, star.x - Math.cos(star.angle) * star.length, star.y - Math.sin(star.angle) * star.length);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${star.opacity})`);
                gradient.addColorStop(1, `rgba(255, 255, 255, 0)`);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(star.x, star.y);
                ctx.lineTo(star.x - Math.cos(star.angle) * star.length, star.y - Math.sin(star.angle) * star.length);
                ctx.stroke();
            }
            requestAnimationFrame(animateStars);
        }

        window.addEventListener('resize', initStars);
        
        // Mouse Trail
        document.addEventListener('mousemove', (e) => {
            const dot = document.createElement('div');
            dot.className = 'trail-dot';
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
            document.body.appendChild(dot);
            setTimeout(() => dot.remove(), 600);
        });

        // Initialize
        initStars();
        animateStars();
        renderApp();

    </script>
</body>
</html>
